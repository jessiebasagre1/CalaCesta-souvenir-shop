<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="shopTitle">Shop - Cala-Cesta</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- ─── NAVBAR ─────────────────────────────────────────── -->
<header>
  <div class="nav-container">
    <a href="index.html" class="logo"><i class="fas fa-gift"></i> Cala-Cesta</a>

    <nav class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="index.html#featured-shops"><i class="fas fa-store"></i> Shops</a>
      <a href="index.html#featured-products"><i class="fas fa-tag"></i> Products</a>
      <a href="orders.html"><i class="fas fa-box"></i> Orders</a>
    </nav>

    <div class="nav-right">
      <div class="auth-section" id="authSection">
        <!-- Dynamic auth buttons/menu -->
      </div>
  </div>
</header>
<!------------------------------------------------------------------------>

  <!-- Shop Header -->
  <section class="shop-hero">
    <div class="container">
      <div class="shop-header" style="display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;">
        <div class="shop-avatar" style="width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(45deg, var(--orange), var(--light-brown)); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white;">
          <i class="fas fa-store"></i>
        </div>
        <div>
          <h1 id="shopName">Loading Shop...</h1>
          <div class="shop-meta" style="display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;">
            <span class="rating" id="shopRating" style="font-size: 1.2rem;">
              <i class="fas fa-star" style="color: var(--orange);"></i> 0.0
            </span>
            <span id="shopProductsCount">0 Products</span>
            <span class="member-since" id="shopMemberSince"></span>
          </div>
          <div class="shop-contact" style="margin-top: 0.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
            <span id="shopOwner"></span>
            <span id="shopEmail"></span>
            <span id="shopPhone"></span>
          </div>
        </div>
        <div style="margin-left: auto;">
          <button class="btn btn-primary" id="followBtn" onclick="toggleFollow()">
            <i class="fas fa-heart"></i> Follow Shop
          </button>
        </div>
      </div>
    </div>
  </section>

  <div class="container" style="margin-top: 3rem;">
    <!-- Filters -->
    <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center;">
      <select id="categoryFilter" onchange="filterProducts()" style="padding: 0.75rem 1rem; border: 2px solid var(--light-brown); border-radius: 12px;">
        <option value="all">All Categories</option>
      </select>
      <select id="sortFilter" onchange="filterProducts()" style="padding: 0.75rem 1rem; border: 2px solid var(--light-brown); border-radius: 12px;">
        <option value="newest">Newest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name">Name A-Z</option>
      </select>
      <div style="margin-left: auto; font-weight: 500;" id="productsCount">0 Products</div>
    </div>

    <!-- Products Grid -->
    <div class="grid" id="shopProducts">
      <!-- Products loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" style="display: none; grid-column: 1 / -1; text-align: center; padding: 6rem 2rem;">
      <i class="fas fa-box-open" style="font-size: 5rem; color: var(--light-brown); margin-bottom: 2rem;"></i>
      <h2>No Products Available</h2>
      <p>This shop is preparing amazing souvenirs for you. Check back soon!</p>
      <div style="margin-top: 2rem;">
        <a href="index.html#featured-shops" class="btn btn-primary">Browse Other Shops</a>
        <a href="business-signup.html" class="btn btn-secondary">Start Your Shop</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script> 
  <script src="js/shop.js"></script>
</body>
</html>
