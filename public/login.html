<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Cala-Cesta</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <form class="auth-form" id="loginForm">
      <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
      
      <div id="errorMessage" style="color: #e74c3c; background: #ffeaea; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none;"></div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your@email.com">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Your password">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
        <span id="btnText">Login</span>
      </button>
      
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        <p>No account? <a href="signup.html">Sign up as Customer</a></p>
        <p><a href="business-signup.html">Create Business Account</a></p>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      
      // Reset
      errorDiv.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Logging in...';
      
      try {
        console.log('🔄 Logging in:', email);
        
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        console.log('📡 Response:', data, 'Status:', response.status);
        
        if (response.ok) {
          // SUCCESS! Save and redirect
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          console.log('✅ Saved to localStorage:', data.user);
          
          // Redirect after 1 second to show success
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1000);
          
          errorDiv.style.display = 'block';
          errorDiv.style.color = '#27ae60';
          errorDiv.style.background = '#d5f4e6';
          errorDiv.innerHTML = '✅ Login successful! Redirecting...';
          
        } else {
          console.error('❌ Login failed:', data.message);
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = `❌ ${data.message}`;
        }
        
      } catch (error) {
        console.error('💥 Network error:', error);
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '💥 Network error. Check server console.';
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
