<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Cala-Cesta</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<!-- ─── NAVBAR ─────────────────────────────────────────── -->
<header>
  <div class="nav-wrap container">
    <a href="index.html" class="logo"><i class="fas fa-gift"></i> Cala<span>-Cesta</span></a>

    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#featured-shops"><i class="fas fa-store"></i> Shops</a></li>
        <li><a href="index.html#top-products">Products</a></li>
        <li><a href="#promo">Deals</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </nav>

    <div class="nav-right">
      <a href="cart.html" class="cart-btn" title="Cart">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </a>
      <div id="authSection">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </div>
</header>

<!-- ─── MAIN ──────────────────────────────────────────── -->
<div class="page-wrap" id="mainContent">
  <div style="text-align:center;padding:4rem"><div class="spinner"></div><p style="color:#aaa;font-size:0.9rem">Loading your profile…</p></div>
</div>

<!-- ─── ORDER DETAIL MODAL ────────────────────────────── -->
<div class="modal-bg" id="orderModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Order Details</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ─── TOAST ──────────────────────────────────────────── -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastMsg"></span>
</div>

<!-- ── RATE PRODUCT MODAL ── -->
<div class="rate-modal-bg" id="rateModal">
  <div class="rate-modal">
    <div class="rate-modal-head">
      <div>
        <h3><i class="fas fa-star"></i> Rate Your Purchase</h3>
        <p>Your feedback helps other buyers and supports local artisans</p>
      </div>
      <button class="rate-modal-close" onclick="closeRateModal()">✕</button>
    </div>
    <div class="rate-modal-body" id="rateModalBody"></div>
  </div>
</div>
<!-- ─── SCRIPTS ────────────────────────────────────────── -->
 <script src="js/auth.js"></script>
 <script>
  document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});
 </script>
<script>
/* ═══════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════ */
let currentUser = null;
let allOrders = [];
let activeTab = 'overview';

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
window.addEventListener('load', async () => {
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = 'login.html'; return; }

  try {
    const res = await fetch('/api/auth/profile', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('auth');
    currentUser = await res.json();

    if (currentUser.userType === 'business') {
      window.location.href = 'business-dashboard.html';
      return;
    }

    await loadAllData();
    renderPage();
    loadCartCount();
  } catch {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
  }
});

/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
function orderNum(o) {
  return o.orderNumber || o._id?.slice(-6).toUpperCase() || '------';
}

async function loadAllData() {
  const token = localStorage.getItem('token');
  try {
    const res = await fetch('/api/customer/orders', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) allOrders = await res.json();
  } catch { allOrders = []; }
}

async function loadCartCount() {
  const token = localStorage.getItem('token');
  try {
    const res = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${token}` } });
    if (res.ok) {
      const cart = await res.json();
      const count = cart.items?.length || 0;
      const badge = document.getElementById('cartBadge');
      if (count > 0) { badge.textContent = count; badge.style.display = 'flex'; }
    }
  } catch {}
}

/* ═══════════════════════════════════════════════════
   RENDER PAGE
═══════════════════════════════════════════════════ */
function renderPage() {
  const totalSpent = allOrders.reduce((s, o) => s + (o.total || 0), 0);
  const delivered = allOrders.filter(o => o.status === 'delivered').length;

  document.getElementById('mainContent').innerHTML = `
    <!-- HERO -->
    <div class="profile-hero">
      <div class="avatar-wrap">
        <div class="avatar"><i class="fas fa-user"></i></div>
        <div class="avatar-status"></div>
      </div>
      <div class="hero-info">
        <h1>${currentUser.name}</h1>
        <p class="email"><i class="fas fa-envelope" style="opacity:.6"></i> ${currentUser.email}</p>
        <span class="badge-pill"><i class="fas fa-user-check"></i> Customer Account</span>
      </div>
      <div class="hero-stats">
        <div class="hstat">
          <span class="hstat-num">${allOrders.length}</span>
          <div class="hstat-label">Orders</div>
        </div>
        <div class="hstat">
          <span class="hstat-num">${delivered}</span>
          <div class="hstat-label">Delivered</div>
        </div>
        <div class="hstat">
          <span class="hstat-num">₱${totalSpent.toFixed(0)}</span>
          <div class="hstat-label">Total Spent</div>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">
        <i class="fas fa-home"></i> <span class="tab-label">Overview</span>
      </button>
      <button class="tab-btn" id="tab-orders" onclick="switchTab('orders')">
        <i class="fas fa-box"></i> <span class="tab-label">My Orders</span>
        ${allOrders.filter(o=>o.status==='pending').length > 0 ? '<span class="notif-dot"></span>' : ''}
      </button>
      <button class="tab-btn" id="tab-track" onclick="switchTab('track')">
        <i class="fas fa-map-marker-alt"></i> <span class="tab-label">Track Order</span>
      </button>
      <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
        <i class="fas fa-cog"></i> <span class="tab-label">Settings</span>
      </button>
    </div>

    <!-- PANELS -->
    <div class="tab-panel active" id="panel-overview">${renderOverview()}</div>
    <div class="tab-panel" id="panel-orders">${renderOrdersPanel()}</div>
    <div class="tab-panel" id="panel-track">${renderTrackPanel()}</div>
    <div class="tab-panel" id="panel-settings">${renderSettingsPanel()}</div>
  `;
}

/* ═══════════════════════════════════════════════════
   OVERVIEW TAB
═══════════════════════════════════════════════════ */
function renderOverview() {
  const totalSpent = allOrders.reduce((s, o) => s + (o.total || 0), 0);
  const pending = allOrders.filter(o => o.status === 'pending').length;
  const delivered = allOrders.filter(o => o.status === 'delivered').length;
  const recent = allOrders.slice(0, 3);

  return `
    <div class="three-col">
      <div class="mini-stat">
        <div class="mini-stat-icon orange"><i class="fas fa-shopping-bag"></i></div>
        <div>
          <div class="mini-stat-val">${allOrders.length}</div>
          <div class="mini-stat-label">Total Orders</div>
        </div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-icon green"><i class="fas fa-check-circle"></i></div>
        <div>
          <div class="mini-stat-val">${delivered}</div>
          <div class="mini-stat-label">Delivered</div>
        </div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-icon brown"><i class="fas fa-dollar-sign"></i></div>
        <div>
          <div class="mini-stat-val">₱${totalSpent.toFixed(0)}</div>
          <div class="mini-stat-label">Total Spent</div>
        </div>
      </div>
    </div>

    <div class="two-col">
      <!-- Recent Orders -->
      <div class="card">
        <div class="card-head">
          <h3><i class="fas fa-clock"></i> Recent Orders</h3>
          <button class="btn btn-outline btn-sm" onclick="switchTab('orders')">View All</button>
        </div>
        ${recent.length === 0
          ? `<div class="empty-state"><i class="fas fa-box-open"></i><h4>No orders yet</h4><p>Start shopping to see your orders here!</p><a href="index.html" class="btn btn-orange" style="margin-top:1rem;display:inline-flex">Shop Now</a></div>`
          : `<div>${recent.map(o => orderRow(o)).join('')}</div>`
        }
      </div>

      <!-- Quick Links + Account Details -->
      <div style="display:flex;flex-direction:column;gap:1.5rem;">
        <div class="card">
          <div class="card-head"><h3><i class="fas fa-bolt"></i> Quick Actions</h3></div>
          <div class="card-body">
            <div class="quick-grid">
              <a href="index.html" class="quick-card"><i class="fas fa-store"></i>Browse Shops</a>
              <a href="cart.html" class="quick-card"><i class="fas fa-shopping-cart"></i>My Cart</a>
              <button class="quick-card" onclick="switchTab('track')"><i class="fas fa-truck"></i>Track Order</button>
              <button class="quick-card" onclick="switchTab('orders')"><i class="fas fa-receipt"></i>All Orders</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h3><i class="fas fa-id-card"></i> Account Info</h3></div>
          <div class="card-body" style="padding-top:0.5rem">
            <div class="detail-row">
              <i class="fas fa-user"></i>
              <div><div class="d-label">Full Name</div><div class="d-val">${currentUser.name}</div></div>
            </div>
            <div class="detail-row">
              <i class="fas fa-envelope"></i>
              <div><div class="d-label">Email</div><div class="d-val">${currentUser.email}</div></div>
            </div>
            <div class="detail-row">
              <i class="fas fa-phone"></i>
              <div><div class="d-label">Phone</div><div class="d-val">${currentUser.phone || '<span style="color:#ccc">Not set</span>'}</div></div>
            </div>
            <div class="detail-row">
              <i class="fas fa-map-marker-alt"></i>
              <div><div class="d-label">Address</div><div class="d-val">${currentUser.address || '<span style="color:#ccc">Not set</span>'}</div></div>
            </div>
            <button class="btn btn-outline btn-full" onclick="switchTab('settings')"><i class="fas fa-edit"></i> Edit Profile</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════
   ORDERS TAB
═══════════════════════════════════════════════════ */
function renderOrdersPanel() {
  const filters = ['All','Pending','Confirmed','Shipped','Delivered','Cancelled'];

  return `
    <div class="card">
      <div class="card-head">
        <h3><i class="fas fa-box"></i> Order History (${allOrders.length})</h3>

        <!-- Desktop: pill buttons -->
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap" id="filterBtns" class="filter-btns-desktop">
          ${filters.map((f,i)=>`
            <button class="btn btn-sm ${i===0?'btn-primary':'btn-outline'}" onclick="filterOrders('${f.toLowerCase()}',this)">
              ${f}
            </button>`).join('')}
        </div>

        <!-- Mobile: select dropdown -->
        <select id="filterSelect" class="filter-select-mobile" onchange="filterOrdersBySelect(this)">
          ${filters.map(f=>`<option value="${f.toLowerCase()}">${f}</option>`).join('')}
        </select>
      </div>
      <div id="ordersList">
        ${allOrders.length === 0
          ? `<div class="empty-state"><i class="fas fa-shopping-bag"></i><h4>No orders yet</h4><p>Your order history will appear here.</p><a href="index.html" class="btn btn-orange" style="margin-top:1rem;display:inline-flex">Start Shopping</a></div>`
          : allOrders.map(o => orderRow(o)).join('')
        }
      </div>
    </div>
  `;
}

function filterOrdersBySelect(selectEl) {
  const filter = selectEl.value;
  const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
  const list = document.getElementById('ordersList');
  list.innerHTML = filtered.length === 0
    ? `<div class="empty-state"><i class="fas fa-box-open"></i><h4>No ${filter} orders</h4></div>`
    : filtered.map(o => orderRow(o)).join('');
}

function filterOrders(filter, btn) {
  document.querySelectorAll('#filterBtns .btn').forEach(b => {
    b.className = b.className.replace('btn-primary','btn-outline');
  });
  btn.className = btn.className.replace('btn-outline','btn-primary');

  const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
  const list = document.getElementById('ordersList');
  list.innerHTML = filtered.length === 0
    ? `<div class="empty-state"><i class="fas fa-box-open"></i><h4>No ${filter} orders</h4></div>`
    : filtered.map(o => orderRow(o)).join('');
}

/* ═══════════════════════════════════════════════════
   TRACK TAB
═══════════════════════════════════════════════════ */
function renderTrackPanel() {
  const active = allOrders.filter(o => !['delivered','cancelled'].includes(o.status));

  return `
    <div class="track-banner">
      <h2><i class="fas fa-shipping-fast"></i> Track Your Order</h2>
      <p>Enter your order number or select from active orders below</p>
      <div class="track-input-row">
        <input type="text" id="trackInput" placeholder="e.g. ABC123" style="text-transform:uppercase">
        <button class="btn btn-orange" onclick="searchTrack()"><i class="fas fa-search"></i> Track</button>
      </div>
    </div>

    <div id="trackResult"></div>

    ${active.length > 0 ? `
      <div class="card">
        <div class="card-head"><h3><i class="fas fa-clock"></i> Active Orders</h3></div>
        <div>${active.map(o => `
          <div class="order-item" onclick="trackOrder('${o._id}')">
            <div style="width:42px;height:42px;border-radius:10px;background:var(--cream);display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-truck" style="color:var(--orange)"></i>
            </div>
            <div style="flex:1">
              <div class="order-num">#${orderNum(o)}</div>
              <div class="order-date">${new Date(o.createdAt).toLocaleDateString()}</div>
            </div>
            <span class="status-pill ${{pending:'status-pending',confirmed:'status-confirmed',shipped:'status-shipped'}[o.status]||'status-pending'}">${o.status}</span>
            <i class="fas fa-chevron-right" style="color:#ccc;margin-left:0.5rem"></i>
          </div>
        `).join('')}</div>
      </div>` : ''
    }
  `;
}

function searchTrack() {
  const val = document.getElementById('trackInput').value.trim();
  if (!val) { showToast('Please enter an order number','error'); return; }

  const found = allOrders.find(o =>
  o.orderNumber === val.toUpperCase() ||
  o._id?.slice(-6).toUpperCase() === val.toUpperCase() ||
  o._id === val
);
  if (!found) {
    document.getElementById('trackResult').innerHTML = `
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-body empty-state"><i class="fas fa-search"></i><h4>Order not found</h4><p>Double-check the order number and try again.</p></div>
      </div>`;
    return;
  }
  trackOrder(found._id);
}

function trackOrder(orderId) {
  const order = allOrders.find(o => o._id === orderId);
  if (!order) return;

  const steps = [
    { key: 'pending',   label: 'Order Placed',     sub: 'We received your order', icon: 'fa-check' },
    { key: 'confirmed', label: 'Order Confirmed',   sub: 'Seller confirmed your order', icon: 'fa-thumbs-up' },
    { key: 'shipped',   label: 'Out for Shipping',  sub: 'Your package is on its way', icon: 'fa-truck' },
    { key: 'delivered', label: 'Delivered',          sub: 'Package delivered!', icon: 'fa-home' }
  ];

  const order_statuses = ['pending','confirmed','shipped','delivered'];
  const currentIdx = order_statuses.indexOf(order.status);

  const tlHtml = steps.map((s, i) => {
    const done = i < currentIdx;
    const curr = i === currentIdx;
    return `
      <div class="tl-step">
        <div class="tl-dot ${done?'done':curr?'current':''}">
          <i class="fas ${done?'fa-check':s.icon}" style="font-size:0.65rem"></i>
        </div>
        <div class="tl-content">
          <div class="tl-title ${(!done&&!curr)?'muted':''}">${s.label}</div>
          ${(done||curr) ? `<div class="tl-sub">${s.sub}</div>` : ''}
        </div>
        ${curr ? `<span class="status-pill status-${order.status}" style="margin-left:auto">${order.status}</span>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('trackResult').innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-head">
        <h3><i class="fas fa-map-marker-alt"></i> Order #${orderNum(order)}</h3>
        <span class="status-pill status-${order.status}">${order.status}</span>
      </div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #f5f1ec">
          <div><div style="font-size:0.78rem;color:#999;font-weight:600;text-transform:uppercase">Order Date</div>
            <div style="margin-top:0.2rem">${new Date(order.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div>
          <div><div style="font-size:0.78rem;color:#999;font-weight:600;text-transform:uppercase">Total</div>
            <div style="margin-top:0.2rem;font-weight:700;color:var(--orange)">₱${(order.total||0).toFixed(2)}</div></div>
          <div><div style="font-size:0.78rem;color:#999;font-weight:600;text-transform:uppercase">Items</div>
            <div style="margin-top:0.2rem">${order.items?.length || 0} item(s)</div></div>
          <div><div style="font-size:0.78rem;color:#999;font-weight:600;text-transform:uppercase">Shipping To</div>
            <div style="margin-top:0.2rem;font-size:0.88rem">${order.shippingAddress || 'N/A'}</div></div>
        </div>
        <div class="timeline">${tlHtml}</div>
        ${order.status !== 'delivered' && order.status !== 'cancelled' ? `
          <div style="margin-top:1.5rem;padding:1rem;background:var(--cream);border-radius:12px;font-size:0.85rem;color:#888;text-align:center">
            <i class="fas fa-sync-alt"></i> Updates are reflected in real time as the seller processes your order.
          </div>` : ''}
      </div>
    </div>
  `;

  document.getElementById('trackResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ═══════════════════════════════════════════════════
   SETTINGS TAB
═══════════════════════════════════════════════════ */
function renderSettingsPanel() {
  return `
    <div class="two-col">
      <div class="card">
        <div class="card-head"><h3><i class="fas fa-user-edit"></i> Edit Profile</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group full">
              <label>Full Name</label>
              <input type="text" id="editName" value="${currentUser.name || ''}">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" value="${currentUser.email || ''}" disabled style="opacity:.5;cursor:not-allowed">
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="editPhone" value="${currentUser.phone || ''}" placeholder="+63 912 345 6789">
            </div>
            <div class="form-group full">
              <label>Address</label>
              <textarea id="editAddress" rows="3" placeholder="Your delivery address">${currentUser.address || ''}</textarea>
            </div>
          </div>
          <button class="btn btn-primary btn-full" onclick="saveProfile()">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <!-- Change Password -->
        <div class="card">
          <div class="card-head"><h3><i class="fas fa-lock"></i> Change Password</h3></div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:.75rem">
              <label style="font-size:.82rem;color:#888;font-weight:600">Current Password</label>
              <div style="position:relative">
                <input type="password" id="currentPassword" placeholder="Enter current password"
                  style="width:100%;padding:.6rem .9rem;border:1.5px solid #e8e4df;border-radius:10px;font-size:.9rem;outline:none;box-sizing:border-box;padding-right:2.5rem">
                <i class="fas fa-eye" id="toggleCurrent"
                  style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);cursor:pointer;color:#bbb;font-size:.85rem"
                  onclick="togglePwVisibility('currentPassword','toggleCurrent')"></i>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:.75rem">
              <label style="font-size:.82rem;color:#888;font-weight:600">New Password</label>
              <div style="position:relative">
                <input type="password" id="newPassword" placeholder="At least 6 characters"
                  style="width:100%;padding:.6rem .9rem;border:1.5px solid #e8e4df;border-radius:10px;font-size:.9rem;outline:none;box-sizing:border-box;padding-right:2.5rem">
                <i class="fas fa-eye" id="toggleNew"
                  style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);cursor:pointer;color:#bbb;font-size:.85rem"
                  onclick="togglePwVisibility('newPassword','toggleNew')"></i>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:1rem">
              <label style="font-size:.82rem;color:#888;font-weight:600">Confirm New Password</label>
              <div style="position:relative">
                <input type="password" id="confirmPassword" placeholder="Re-enter new password"
                  style="width:100%;padding:.6rem .9rem;border:1.5px solid #e8e4df;border-radius:10px;font-size:.9rem;outline:none;box-sizing:border-box;padding-right:2.5rem">
                <i class="fas fa-eye" id="toggleConfirm"
                  style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);cursor:pointer;color:#bbb;font-size:.85rem"
                  onclick="togglePwVisibility('confirmPassword','toggleConfirm')"></i>
              </div>

async function saveProfile() {
  const token = localStorage.getItem('token');
  const body = {
    name: document.getElementById('editName').value.trim(),
    phone: document.getElementById('editPhone').value.trim(),
    address: document.getElementById('editAddress').value.trim()
  };

  if (!body.name) { showToast('Name cannot be empty','error'); return; }

  try {
    const res = await fetch('/api/customer/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      currentUser = { ...currentUser, ...body };
      showToast('Profile updated successfully!','success');
      // Re-render to reflect name change in hero
      renderPage();
      switchTab('settings');
    } else {
      showToast('Failed to update profile','error');
    }
  } catch {
    showToast('Update failed — check your connection','error');

}

// ── OPEN RATE MODAL ──
async function openRateModal(productId, productName, productPrice, productImage) {
  // Check if already reviewed
  const token = localStorage.getItem('token');
  try {
    const res = await fetch(`/api/products/${productId}/review-eligibility`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.canReview && data.reason === 'already_reviewed') {
      showToast('You\'ve already reviewed this product!', 'error');
      // Mark as rated
      if (!window.__ratedProducts) window.__ratedProducts = [];
      window.__ratedProducts.push(productId);
      renderPage(); switchTab('orders');
      return;
    }
  } catch {}

  rateState = { productId, productName, productPrice, productImage, selectedRating: 0 };

  // Fetch product image if missing
  let imgSrc = productImage || 'https://images.unsplash.com/photo-1608043152266-119cb09fc56e?w=120&fit=crop';
  try {
    if (!productImage) {
      const pRes = await fetch(`/api/products/${productId}`);
      if (pRes.ok) { const p = await pRes.json(); imgSrc = p.image || imgSrc; rateState.productImage = imgSrc; }
    }
  } catch {}

  document.getElementById('rateModalBody').innerHTML = `
    <div class="rate-product-preview">
      <img src="${imgSrc}" class="rate-product-img" alt="${productName}" onerror="this.src='https://images.unsplash.com/photo-1608043152266-119cb09fc56e?w=120&fit=crop'">
      <div>
        <div class="rate-product-name">${productName}</div>
        <div class="rate-product-price">₱${parseFloat(productPrice||0).toFixed(2)}</div>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:.5rem;font-size:.88rem;font-weight:600;color:#888">How would you rate this product?</div>
    <div class="rate-star-row" id="rateStarRow">
      <i class="far fa-star" data-val="1"></i>
      <i class="far fa-star" data-val="2"></i>
      <i class="far fa-star" data-val="3"></i>
      <i class="far fa-star" data-val="4"></i>
      <i class="far fa-star" data-val="5"></i>
    </div>
    <div class="rate-label" id="rateLabel">Tap a star to rate</div>

    <input type="text" class="rate-input" id="rateTitle" placeholder="Give your review a title (optional)">
    <textarea class="rate-input" id="rateComment" placeholder="Share your experience — what did you love about it? How was the quality and packaging?" rows="3"></textarea>

    <button class="rate-submit-btn" id="rateSubmitBtn" onclick="submitRating()">
      <i class="fas fa-paper-plane"></i> Submit Review
    </button>
    <p style="text-align:center;font-size:.78rem;color:#aaa;margin-top:.75rem">Only customers who purchased this product can leave a review.</p>
  `;

  // Wire up star picker
  const stars = document.querySelectorAll('#rateStarRow i');
  stars.forEach(star => {
    star.addEventListener('mouseover', () => highlightRateStars(parseInt(star.dataset.val)));
    star.addEventListener('mouseout', () => highlightRateStars(rateState.selectedRating));
    star.addEventListener('click', () => {
      rateState.selectedRating = parseInt(star.dataset.val);
      highlightRateStars(rateState.selectedRating);
      document.getElementById('rateLabel').textContent = rateLabels[rateState.selectedRating];
    });
  });

  document.getElementById('rateModal').classList.add('open');
}

function highlightRateStars(n) {
  const stars = document.querySelectorAll('#rateStarRow i');
  stars.forEach(s => {
    const v = parseInt(s.dataset.val);
    s.className = v <= n ? 'fas fa-star lit' : 'far fa-star';
  });
}

function closeRateModal() {
  document.getElementById('rateModal').classList.remove('open');
  rateState = { productId: null, productName: null, productPrice: null, productImage: null, selectedRating: 0 };
}

// ── SUBMIT RATING ──
async function submitRating() {
  const token = localStorage.getItem('token');
  if (!token) { showToast('Please login first', 'error'); return; }
  if (!rateState.selectedRating) { showToast('Please select a star rating', 'error'); return; }

  const comment = document.getElementById('rateComment').value.trim();
  const title = document.getElementById('rateTitle').value.trim();
  if (!comment) { showToast('Please write a short review', 'error'); return; }

  const btn = document.getElementById('rateSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting…';

  try {
    const res = await fetch(`/api/products/${rateState.productId}/reviews`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ rating: rateState.selectedRating, title, comment })
    });
    const data = await res.json();

    if (res.ok) {
      // Mark product as rated locally
      if (!window.__ratedProducts) window.__ratedProducts = [];
      window.__ratedProducts.push(rateState.productId);

      showToast('Review submitted! Thank you 🙏');
      closeRateModal();
      // Refresh orders panel to reflect rated state
      renderPage();
      switchTab('orders');
    } else {
      showToast(data.message || 'Submission failed', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Review';
    }
  } catch {
    showToast('Network error — please try again', 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Review';
  }
}

function togglePwVisibility(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (!input) return;
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
  icon.style.cssText = icon.style.cssText; // preserve inline styles
}

// Wire up strength meter when new password is typed
document.addEventListener('input', e => {
  if (e.target.id !== 'newPassword') return;
  const val = e.target.value;
  const bar  = document.getElementById('pwStrengthBar');
  const fill = document.getElementById('pwStrengthFill');
  const lbl  = document.getElementById('pwStrengthLabel');
  if (!bar) return;

  if (!val) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';

  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { label: 'Very weak', color: '#e53e3e', width: '20%' },
    { label: 'Weak',      color: '#dd6b20', width: '40%' },
    { label: 'Fair',      color: '#d69e2e', width: '60%' },
    { label: 'Strong',    color: '#38a169', width: '80%' },
    { label: 'Very strong', color: '#276749', width: '100%' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width = lvl.width;
  fill.style.background = lvl.color;
  lbl.textContent = lvl.label;
  lbl.style.color = lvl.color;
});

async function changePassword() {
  const currentPassword = document.getElementById('currentPassword')?.value.trim();
  const newPassword     = document.getElementById('newPassword')?.value.trim();
  const confirmPassword = document.getElementById('confirmPassword')?.value.trim();

  if (!currentPassword) return showToast('Enter your current password', 'error');
  if (!newPassword)     return showToast('Enter a new password', 'error');
  if (newPassword.length < 6) return showToast('New password must be at least 6 characters', 'error');
  if (newPassword !== confirmPassword) return showToast('Passwords do not match', 'error');
  if (currentPassword === newPassword) return showToast('New password must be different from current', 'error');

  const token = localStorage.getItem('token');
  try {
    const res = await fetch('/api/customer/change-password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Password changed successfully!');
      // Clear fields
      ['currentPassword','newPassword','confirmPassword'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      const bar = document.getElementById('pwStrengthBar');
      if (bar) bar.style.display = 'none';
    } else {
      showToast(data.message || 'Failed to change password', 'error');
    }
  } catch {
    showToast('Network error — please try again', 'error');
  }
}

/* ═══════════════════════════════════════════════════
   EMAIL VERIFICATION
═══════════════════════════════════════════════════ */
let verifyCountdown = null;

async function sendVerificationCode() {
  const token = localStorage.getItem('token');
  try {
    const res = await fetch('/api/customer/send-verification', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (res.ok) {
      showToast('Verification code sent!');
      // Show code input step
      const step1 = document.getElementById('verifyStep1');
      const step2 = document.getElementById('verifyStep2');
      if (step1) step1.style.display = 'none';
      if (step2) step2.style.display = 'block';
      startVerifyCountdown(10 * 60);

      // Dev only: auto-fill the code
      if (data.devCode) {
        const input = document.getElementById('verifyCodeInput');
        if (input) input.value = data.devCode;
        showToast(`Dev mode — code: ${data.devCode}`, 'error');
      }
    } else {
      showToast(data.message || 'Failed to send code', 'error');
    }
  } catch {
    showToast('Network error — please try again', 'error');
  }
}

function startVerifyCountdown(seconds) {
  if (verifyCountdown) clearInterval(verifyCountdown);
  const el = document.getElementById('codeExpiry');
  let remaining = seconds;

  verifyCountdown = setInterval(() => {
    remaining--;
    if (!document.getElementById('codeExpiry')) { clearInterval(verifyCountdown); return; }
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    if (el) el.textContent = `Code expires in ${m}:${s}`;
    if (remaining <= 0) {
      clearInterval(verifyCountdown);
      if (el) el.textContent = 'Code expired — please resend';
      if (el) el.style.color = '#e53e3e';
    }
  }, 1000);
}

async function verifyEmailCode() {
  const code  = document.getElementById('verifyCodeInput')?.value.trim();
  const token = localStorage.getItem('token');

  if (!code || code.length !== 6) return showToast('Enter the 6-digit code', 'error');

  try {
    const res = await fetch('/api/customer/verify-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ code })
    });
    const data = await res.json();

    if (res.ok) {
      if (verifyCountdown) clearInterval(verifyCountdown);
      showToast('Email verified successfully! 🎉');
      currentUser.emailVerified = true;
      renderPage();
      switchTab('settings');
    } else {
      showToast(data.message || 'Invalid code', 'error');
    }
  } catch {
    showToast('Network error — please try again', 'error');
  }
}

/* ═══════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════ */
function confirmLogout() {
  if (confirm('Are you sure you want to logout?')) logout();
}

function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}
</script>
