<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Sign Up - Cala-Cesta</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <form class="auth-form" id="businessSignupForm">
      <h2><i class="fas fa-store"></i> Business Account</h2>
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="businessName">Business Name</label>
        <input type="text" id="businessName" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone">
      </div>
      <div class="form-group">
        <label for="address">Business Address</label>
        <textarea id="address" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Create Business Account</button>
      <div style="text-align: center; margin-top: 1.5rem;">
        <p>Customer? <a href="signup.html">Create Customer Account</a></p>
        <p><a href="login.html">Login</a></p>
      </div>
    </form>
  </div>
  <script>
    document.getElementById('businessSignupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = {
        name: document.getElementById('name').value,
        businessName: document.getElementById('businessName').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
      };

      try {
        const response = await fetch('/api/auth/business-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();
        alert(data.message);
        if (response.ok) {
          window.location.href = 'login.html';
        }
      } catch (error) {
        alert('Signup failed');
      }
    });
  </script>
</body>
</html>
